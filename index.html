const API=SB_URL+'/rest/v1/wc2026';
const H={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'};

function normData(d){
  d=(d&&typeof d==="object")?d:{};
  return {
    players:d.players||{},
    groupResults:d.groupResults||{},
    knockoutResults:d.knockoutResults||{},
    knockoutMatches:d.knockoutMatches||{},
    champion:d.champion||null,
    locked:!!d.locked,
    deadline:d.deadline||"",
    settings:d.settings||{}
  };
}
function localRead(){try{return normData(JSON.parse(localStorage.getItem("wc2026_data")||"{}"));}catch(e){return EMPTY;}}
function localWrite(data){try{localStorage.setItem("wc2026_data",JSON.stringify(normData(data)));}catch(e){}}

async function dbRead(){
  try{
    const r=await fetch(API+'?id=eq.main&select=data',{headers:H});
    if(!r.ok){const t=await r.text();throw new Error(r.status+': '+t);}
    const rows=await r.json();
    if(rows&&rows.length){const data=normData(rows[0].data);localWrite(data);return data;}
    try{await dbWrite(EMPTY);}catch(e){}
    return localRead();
  }catch(e){
    console.warn('Supabase read failed; using local copy only:', e);
    return localRead();
  }
}
async function dbWrite(data){
  const clean=normData(data);
  localWrite(clean);
  try{
    const r=await fetch(API+'?on_conflict=id',{
      method:'POST',
      headers:{...H,'Prefer':'resolution=merge-duplicates,return=minimal'},
      body:JSON.stringify({id:'main',data:clean,updated_at:new Date().toISOString()})
    });
    if(!r.ok){const t=await r.text();throw new Error(r.status+': '+t);}
  }catch(e){
    console.warn('Supabase write failed; saved locally only:', e);
    throw e;
  }
}

let _pt=null;
function startPoll(cb){clearInterval(_pt);_pt=setInterval(async()=>{try{const d=await dbRead();cb(d);}catch(e){}},8000);}

function normName(x){return String(x||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9]+/g," ").trim();}

function uaeParts(t){
  const d=new Date(t);
  const parts=new Intl.DateTimeFormat('en-CA',{timeZone:UAE_TZ,year:'numeric',month:'2-digit',day:'2-digit'}).formatToParts(d);
  const get=k=>parts.find(p=>p.type===k)?.value||'';
  return {y:get('year'),m:get('month'),d:get('day')};
}
function uaeYmd(t){const p=uaeParts(t);return p.y+'-'+p.m+'-'+p.d;}
function ymd(d){return uaeYmd(d);}

async function fetchJsonFromApi(url, token=''){
  const headers={};
  if(token)headers.Authorization='Bearer '+token;
  const tryFetch=async(fetchUrl, fetchHeaders=headers)=>{
    const r=await fetch(fetchUrl,{headers:fetchHeaders,cache:'no-store'});
    if(!r.ok)throw new Error(r.status+': '+await r.text());
    return await r.json();
  };
  try{
    return await tryFetch(url);
  }catch(firstErr){
    // Static sites on GitHub Pages cannot bypass CORS. If a public no-key API blocks
    // browsers, retry through public CORS mirrors. Token/private APIs are not proxied.
    if(token)throw firstErr;
    const encoded=encodeURIComponent(url);
    const proxies=[
      'https://api.allorigins.win/raw?url='+encoded,
      'https://corsproxy.io/?'+encoded
    ];
    let lastErr=firstErr;
    for(const proxyUrl of proxies){
      try{return await tryFetch(proxyUrl,{});}catch(e){lastErr=e;}
    }
    throw new Error(String(firstErr).replace(/^TypeError: /,'')+' — CORS/proxy fallback failed: '+String(lastErr).replace(/^Error: /,''));

}
