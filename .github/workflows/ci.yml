name: CI

# Runs the scoring-engine tests and a production build on every PR and on pushes
# to main. This is the safety net for the app's core maths: a change that breaks
# the scoring rules or the knockout logic fails here before it can be merged.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - name: Scoring engine tests
        run: npm test
      - name: Production build
        run: npm run build
