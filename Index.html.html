:root{

body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.5;min-height:100vh}
button{font-family:inherit;cursor:pointer}
input,select{font-family:inherit;font-size:14px;border:1.5px solid var(--border2);border-radius:var(--radius-sm);padding:7px 10px;outline:none;background:var(--surface);color:var(--text)}
input:focus,select:focus{border-color:var(--blue)}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
.app{max-width:920px;margin:0 auto;padding:0 0 4rem}
.hdr{background:var(--blue-dark);padding:1.1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:1.25rem;border-radius:0 0 var(--radius) var(--radius)}
.hdr-left{display:flex;align-items:center;gap:10px}
.hdr-title{font-size:17px;font-weight:600;color:#fff}
.hdr-sub{font-size:11px;color:rgba(255,255,255,.5);display:flex;align-items:center;gap:4px;margin-top:2px}
.hdr-right{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.nav-btn{font-size:13px;padding:6px 15px;border-radius:20px;border:none;cursor:pointer;font-weight:500;transition:background .15s,color .15s}
.nav-btn.on{background:#fff;color:var(--blue-dark)}
.nav-btn.off{background:rgba(255,255,255,.15);color:#fff}
.nav-btn.off:hover{background:rgba(255,255,255,.25)}
.nav-btn.admin-on{background:rgba(239,159,39,.25);color:#EF9F27;font-size:12px}
.nav-btn.admin-off{background:rgba(255,255,255,.1);color:rgba(255,255,255,.6);font-size:12px}
.prize{background:var(--gold);color:#4A1B0C;padding:3px 12px;border-radius:20px;font-weight:700;font-size:13px}
.card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:1.25rem;margin-bottom:1rem}
.csm{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 15px;border-radius:20px;font-size:13px;font-weight:500;border:1.5px solid transparent;cursor:pointer;transition:all .15s;font-family:inherit}
.btn-pr{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-pr:hover{background:#0C447C}
.btn-ok{background:var(--green-light);color:var(--green-dark);border-color:var(--green)}
.btn-ok:hover{background:#9FE1CB}
.btn-ng{background:var(--red-light);color:var(--red);border-color:var(--red)}
.btn-wn{background:transparent;color:var(--text2);border-color:var(--border2)}
.btn-wn:hover{background:var(--surface2)}
.btn-am{background:var(--amber-light);color:var(--amber-dark);border-color:var(--amber)}
.btn-sm{padding:4px 11px;font-size:12px}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1rem}
.chip{padding:5px 12px;border-radius:20px;font-size:12px;cursor:pointer;border:1.5px solid var(--border);background:transparent;color:var(--text2);font-weight:500;font-family:inherit}
.chip:hover{border-color:var(--border2)}
.chip.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.chip.dn{color:var(--green-dark);border-color:var(--green)}
.pbar{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.pfill{height:100%;background:var(--green);border-radius:3px;transition:width .4s}
.stepper{display:flex;flex-direction:column;align-items:center;gap:3px}
.sbt{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--border2);background:var(--surface);color:var(--text);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-family:inherit}
.sbt:hover:not(:disabled){border-color:var(--blue);color:var(--blue);background:var(--blue-light)}
.sbt:disabled{opacity:.3;cursor:default}
.sval{width:44px;height:44px;border-radius:var(--radius-sm);border:2px solid var(--border);background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:600;color:var(--text3)}
.sval.on{border-color:var(--blue);color:var(--text);background:var(--surface)}
.mc{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;position:relative;overflow:hidden}
.mac{position:absolute;top:0;left:0;right:0;height:3px}
.mpb{position:absolute;top:8px;right:10px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.lbr{display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid var(--border)}
.lbrank{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0}
.admin-bar{background:#fefce8;border:1px solid #fde68a;border-radius:var(--radius);padding:.875rem 1.25rem;margin-bottom:1.25rem;display:flex;flex-wrap:wrap;gap:12px;align-items:center}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:999;padding:1rem}
.modal{background:var(--surface);border-radius:var(--radius);padding:1.5rem;width:360px;max-width:100%}
.g2{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px}
.g3{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px}
.g4{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px}
.ctr{max-width:420px;margin:3rem auto;padding:0 1rem;text-align:center}
.toast{position:fixed;bottom:22px;right:22px;background:var(--green-dark);color:#fff;padding:9px 16px;border-radius:var(--radius);font-size:13px;font-weight:500;z-index:9999;animation:fup .2s}
.toast.err{background:var(--red)}
@keyframes fup{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.stile{background:var(--surface2);border-radius:var(--radius-sm);padding:.875rem 1rem;text-align:center}
.sync{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;margin-right:4px}
.sync.s{background:var(--amber);animation:pu 1s infinite}
.sync.e{background:var(--red)}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.3}}
.fix-sql{background:#fff3cd;border:1px solid #ffc107;border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:1rem;font-size:13px}
.fix-sql code{display:block;background:#0f172a;color:#e2e8f0;padding:12px;border-radius:6px;font-family:monospace;font-size:12px;margin:8px 0;white-space:pre;overflow-x:auto}
[dir="rtl"] body{text-align:right}[dir="rtl"] .hdr,[dir="rtl"] .hdr-right,[dir="rtl"] .hdr-left,[dir="rtl"] .admin-bar{direction:rtl}[dir="rtl"] .lbr{direction:rtl}[dir="rtl"] .toast{right:auto;left:22px}.lang-select{font-size:12px;padding:5px 8px;border-radius:18px;border:none;background:rgba(255,255,255,.15);color:#fff}.lang-select option{color:#0f172a;background:#fff}
@media(max-width:600px){.hdr{border-radius:0}}

function isAr(){return S.lang==="ar";}
function tr(s){return isAr()?(AR_MAP[String(s)]||String(s)):String(s);}
function localizeString(s){
  if(!isAr())return s;
  let out=String(s);
  Object.keys(AR_MAP).sort((a,b)=>b.length-a.length).forEach(k=>{out=out.split(k).join(AR_MAP[k]);});
  out=out.replace(/\bGroup\s+([A-L])\b/g,"المجموعة $1");
  out=out.replace(/\bMatch\s+(\d+)\b/g,"مباراة $1");
  out=out.replace(/\b(\d+)\s+players\b/g,"$1 لاعبين");
  out=out.replace(/\b(\d+)\s+player\b/g,"$1 لاعب");
  return out;
}
function localizeDOM(root){
  if(!isAr())return;
  const walker=document.createTreeWalker(root,NodeFilter.SHOW_TEXT);
  const nodes=[]; while(walker.nextNode())nodes.push(walker.currentNode);
  nodes.forEach(n=>{n.nodeValue=localizeString(n.nodeValue);});
  root.querySelectorAll("input,textarea").forEach(e=>{if(e.placeholder)e.placeholder=localizeString(e.placeholder);});
  root.querySelectorAll("[title]").forEach(e=>e.setAttribute("title",localizeString(e.getAttribute("title"))));
}

    if(S.screen==="name")          content.appendChild(sName());
    else if(S.screen==="groups")   content.appendChild(sGroups());
    else if(S.screen==="matches")  content.appendChild(sMatches());
    else if(S.screen==="knockout") content.appendChild(sKnockout());
    else if(S.screen==="champion") content.appendChild(sChampion());
  } else content.appendChild(sDash());

  wrap.appendChild(content);
  if(S.toast) wrap.appendChild(D({cls:"toast"+(S.terr?" err":"")},[S.toast]));
  root.appendChild(wrap);
  localizeDOM(root);
  if(S.showLogin) setTimeout(()=>{const i=document.getElementById("apw");if(i)i.focus();},50);
}

init();

}catch(e){ showFatal(e); }
})();
</script>
</body>
